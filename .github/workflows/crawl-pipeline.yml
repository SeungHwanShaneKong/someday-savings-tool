# [ZERO-COST-PIPELINE-2026-03-07] 웨딩 데이터 크롤링 파이프라인
# 3회/일 자동 실행 (KST 08:00, 16:00, 24:00) + 수동 트리거 지원
# GitHub Actions Free tier: 2,000분/월 → 충분 (1회 ~3분 × 3회/일 × 30일 = ~270분)

name: Wedding Data Pipeline

on:
  schedule:
    # UTC 기준 → KST -9시간
    # KST 08:00 = UTC 23:00 (전날)
    # KST 16:00 = UTC 07:00
    # KST 24:00 = UTC 15:00
    - cron: '0 23,7,15 * * *'
  workflow_dispatch:
    inputs:
      skip_documents:
        description: 'Skip PDF/PPT document crawling'
        required: false
        default: 'false'
        type: boolean
      skip_edge_function:
        description: 'Skip Edge Function web crawling'
        required: false
        default: 'false'
        type: boolean

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  EDGE_FUNCTION_URL: ${{ secrets.EDGE_FUNCTION_URL }}
  EDGE_FUNCTION_KEY: ${{ secrets.EDGE_FUNCTION_KEY }}
  CRON_SECRET: ${{ secrets.CRON_SECRET }}

jobs:
  crawl-documents:
    name: Crawl Documents (PDF/PPT)
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_documents != 'true' }}
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: '.github/scripts/requirements.txt'

      - name: Install dependencies
        run: pip install -r .github/scripts/requirements.txt

      - name: Run document crawler
        run: python .github/scripts/crawl_documents.py
        env:
          PYTHONUNBUFFERED: '1'

      - name: Log completion
        if: always()
        run: echo "Document crawl completed at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

  crawl-web:
    name: Crawl Web Sources
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_edge_function != 'true' }}
    needs: crawl-documents
    # Run even if crawl-documents was skipped
    if: ${{ always() && github.event.inputs.skip_edge_function != 'true' }}
    timeout-minutes: 5

    steps:
      - name: Trigger Edge Function crawl
        run: |
          echo "Triggering crawl-wedding-data Edge Function..."

          HTTP_STATUS=$(curl -s -o response.json -w "%{http_code}" \
            -X POST "${EDGE_FUNCTION_URL}/functions/v1/crawl-wedding-data" \
            -H "X-Cron-Secret: ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            -H "apikey: ${EDGE_FUNCTION_KEY}")

          echo "HTTP Status: ${HTTP_STATUS}"
          echo "Response:"
          cat response.json | python3 -m json.tool 2>/dev/null || cat response.json

          if [ "${HTTP_STATUS}" -ge 400 ]; then
            echo "::error::Edge Function returned HTTP ${HTTP_STATUS}"
            exit 1
          fi

          echo "Edge Function crawl completed successfully"

      - name: Log completion
        if: always()
        run: echo "Web crawl completed at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [crawl-documents, crawl-web]
    if: always()
    timeout-minutes: 2

    steps:
      - name: Report pipeline status
        run: |
          echo "═══════════════════════════════════════════"
          echo "  Wedding Data Pipeline Summary"
          echo "═══════════════════════════════════════════"
          echo "  Trigger: ${{ github.event_name }}"
          echo "  Time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "  KST:  $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M:%S KST')"
          echo "  Documents: ${{ needs.crawl-documents.result }}"
          echo "  Web Crawl: ${{ needs.crawl-web.result }}"
          echo "═══════════════════════════════════════════"
