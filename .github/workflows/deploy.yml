name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      # [CL-SSG-PRERENDER-20260531] Puppeteer Chromium 설치 (프리렌더 SSG용)
      - run: npx puppeteer browsers install chrome

      # vite build + Puppeteer 프리렌더(본문/canonical/JSON-LD 정적화 + 404 폴백 + sitemap)
      - run: npm run build:ssg

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
