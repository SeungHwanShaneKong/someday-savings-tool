<!-- [CL-BRAND-V5-20260711-191500] 웨딩셈 브랜드 마크 v5 마스터(벡터 단일소스).
     컨셉 '하트 위 플래티넘 인터로킹 웨딩링': 핑크 하트 바디 위에 두 백금 반지가 부분적으로 겹쳐 끼워짐.
     다이아몬드는 별도 프롱 세팅이 아니라 **앞 밴드에 녹아든 베젤 세팅**(밴드 폭 안에 매입) + 파베 멜리 3석.
     쿨톤 플래티넘 그라데이션 + 정반사 하이라이트. 상단 교차=왼쪽 밴드 위, 하단 교차=오른쪽 밴드 위(weave).
     기하: center L(42.5,41)/R(57.5,41), 밴드 도넛 r12/r8. 수정 시 `pnpm run brand:assets` 재실행. -->
<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="웨딩셈 하트 플래티넘 웨딩링 마크">
  <defs>
    <linearGradient id="gFront" x1="15%" y1="10%" x2="80%" y2="95%">
      <stop offset="0%" stop-color="#FF8FB3"/>
      <stop offset="50%" stop-color="#F2547F"/>
      <stop offset="100%" stop-color="#DE2F63"/>
    </linearGradient>
    <linearGradient id="gPlat" x1="18%" y1="6%" x2="82%" y2="94%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="45%" stop-color="#E9EEF4"/>
      <stop offset="100%" stop-color="#AEB9C6"/>
    </linearGradient>
    <radialGradient id="gDiaSet" cx="38%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="55%" stop-color="#E6F3FF"/>
      <stop offset="100%" stop-color="#B9D8F2"/>
    </radialGradient>
    <radialGradient id="gShine" cx="30%" cy="22%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="170%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#D42A5E" flood-opacity="0.25"/>
    </filter>
    <filter id="ringShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="1.4" stdDeviation="1.2" flood-color="#54657A" flood-opacity="0.38"/>
    </filter>
  </defs>

  <!-- 마크 본체: 100 좌표계 → 512 캔버스 중앙 배치 -->
  <g transform="translate(46 26) scale(4.2)">
    <!-- 하트 바디(그라데이션) + 소프트 섀도로 부양 -->
    <g filter="url(#softShadow)">
      <path fill="url(#gFront)" d="M 50 94 Q 35.5 73 12.6 49.4 A 24 24 0 1 1 50 19.34 A 24 24 0 1 1 87.4 49.4 Q 64.5 73 50 94 Z"/>
    </g>
    <ellipse cx="30" cy="16.5" rx="13" ry="6" fill="url(#gShine)" transform="rotate(-16 30 16.5)"/>

    <!-- 인터로킹 플래티넘 밴드 (두께 있는 도넛) -->
    <g filter="url(#ringShadow)">
      <!-- 왼쪽 밴드(뒤) — 웨딩 밴드 -->
      <path fill="url(#gPlat)" fill-rule="evenodd"
            d="M 30.5 41 a 12 12 0 1 0 24 0 a 12 12 0 1 0 -24 0 Z
               M 34.5 41 a 8 8 0 1 1 16 0 a 8 8 0 1 1 -16 0 Z"/>
      <!-- 오른쪽 밴드(앞) — 다이아 매입 밴드 -->
      <path fill="url(#gPlat)" fill-rule="evenodd"
            d="M 45.5 41 a 12 12 0 1 0 24 0 a 12 12 0 1 0 -24 0 Z
               M 49.5 41 a 8 8 0 1 1 16 0 a 8 8 0 1 1 -16 0 Z"/>
      <!-- weave: 상단 교차에서 왼쪽 밴드가 위(밴드 폭 4로 도넛과 정합) -->
      <path d="M 45.09 31.34 A 10 10 0 0 1 52.40 39.61" fill="none" stroke="url(#gPlat)" stroke-width="4"/>
    </g>

    <!-- 밴드 정반사 하이라이트(플래티넘 광택 — 쿨 화이트) -->
    <path d="M 35.2 34.5 A 10 10 0 0 1 39.6 30.6" fill="none" stroke="#FFFFFF" stroke-width="1.6" stroke-linecap="round" opacity="0.95"/>
    <path d="M 61.2 34.0 A 10 10 0 0 1 64.6 37.8" fill="none" stroke="#FFFFFF" stroke-width="1.4" stroke-linecap="round" opacity="0.85"/>
    <path d="M 38.6 49.6 A 10 10 0 0 1 36.0 45.8" fill="none" stroke="#FFFFFF" stroke-width="1.1" stroke-linecap="round" opacity="0.6"/>

    <!-- 다이아몬드 — 앞 밴드 상단에 '녹아든' 베젤 세팅(밴드 폭 안, 12시 방향 중심선 r10 지점) -->
    <g filter="url(#ringShadow)">
      <!-- 베젤 림(밴드와 한 몸) -->
      <circle cx="57.5" cy="31" r="3.1" fill="url(#gPlat)"/>
      <!-- 매입 스톤 -->
      <circle cx="57.5" cy="31" r="2.2" fill="url(#gDiaSet)"/>
      <!-- 파셋 라인(브릴리언트 컷 인상 — 아주 가늘게) -->
      <path d="M 55.9 30.2 L 59.1 31.8 M 55.9 31.8 L 59.1 30.2 M 57.5 28.8 L 57.5 33.2 M 55.3 31 L 59.7 31"
            stroke="#FFFFFF" stroke-width="0.35" opacity="0.9"/>
    </g>
    <!-- 파베 멜리 3석 — 스톤 좌우로 밴드에 녹아든 작은 다이아 -->
    <circle cx="52.9" cy="32.6" r="0.95" fill="url(#gDiaSet)"/>
    <circle cx="62.1" cy="32.6" r="0.95" fill="url(#gDiaSet)"/>
    <circle cx="65.6" cy="35.6" r="0.8" fill="url(#gDiaSet)"/>

    <!-- 스톤 반짝임 -->
    <path d="M 62.4 25.6 C 62.8 27.1 63.4 27.7 64.9 28.1 C 63.4 28.5 62.8 29.1 62.4 30.6 C 62 29.1 61.4 28.5 59.9 28.1 C 61.4 27.7 62 27.1 62.4 25.6 Z" fill="#FFFFFF" opacity="0.95"/>
  </g>
</svg>
